name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:5.0
        ports: ["27017:27017"]
        options: >-
          --health-cmd="mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      MONGODB_USER: ${{ vars.MONGODB_USER }}
      MONGODB_PASSWORD: ${{ secrets.MONGODB_PASSWORD }}
      MONGODB_HOST: localhost
      MONGODB_CLUSTER: ${{ vars.MONGODB_CLUSTER }}
      MONGO_URI: mongodb://localhost:27017/testdb

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Format
        run: pnpm format

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit Tests
        timeout-minutes: 5
        run: NODE_ENV=test pnpm test:unit
        env:
          NODE_ENV: test
          IS_PODMAN: false
          MONGODB_USER: ${{ env.MONGODB_USER }}
          MONGODB_PASSWORD: ${{ env.MONGODB_PASSWORD }}
          MONGODB_HOST: ${{ env.MONGODB_HOST }}
          MONGO_URI: ${{ env.MONGO_URI }}

      - name: Integration Tests
        timeout-minutes: 5
        run: |
          NODE_ENV=test pnpm test:int-src
          NODE_ENV=test pnpm test:integrations
        env:
          NODE_ENV: test
          IS_PODMAN: false
          MONGODB_USER: ${{ env.MONGODB_USER }}
          MONGODB_PASSWORD: ${{ env.MONGODB_PASSWORD }}
          MONGODB_HOST: ${{ env.MONGODB_HOST }}
          MONGO_URI: ${{ env.MONGO_URI }}

      - name: E2E Tests
        timeout-minutes: 5
        run: NODE_ENV=test pnpm test:e2e
        env:
          NODE_ENV: test
          MONGO_URI: ${{ env.MONGO_URI }}
