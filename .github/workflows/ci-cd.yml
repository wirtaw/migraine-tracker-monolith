name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches:  [master]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:5.0
        ports: ['27017:27017']
        options: >-
          --health-cmd="mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      MONGODB_USER: ${{ vars.MONGODB_USER }}
      MONGODB_PASSWORD: ${{ secrets.MONGODB_PASSWORD }}
      MONGODB_HOST: mongo
      MONGODB_CLUSTER: ${{ vars.MONGODB_CLUSTER }}
      MONGO_URI: mongodb://mongo:27017/testdb

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Format
        run: pnpm format
      
      - name: Wait for MongoDB to be ready
        run: |
          node -e "
          const net = require('net');
          const RETRIES = 10;
          let attempts = 0;
      
          function check() {
            const socket = net.createConnection(27017, 'mongo');
            socket.on('connect', () => {
              console.log('MongoDB is ready!');
              socket.end();
            });
            socket.on('error', () => {
              if (++attempts >= RETRIES) {
                console.error('MongoDB did not start in time.');
                process.exit(1);
              } else {
                console.log('Waiting for MongoDB...');
                setTimeout(check, 5000);
              }
            });
          }
      
          check();
          "

      - name: Test
        run: NODE_ENV=test pnpm test
        env:
          NODE_ENV: test
          IS_PODMAN: false
          MONGODB_USER: ${{ env.MONGODB_USER }}
          MONGODB_PASSWORD: ${{ env.MONGODB_PASSWORD }}
          MONGODB_HOST: ${{ env.MONGODB_HOST }}
          MONGODB_CLUSTER: 
          MONGO_URI: ${{ env.MONGO_URI }}

      - name: Test E2E
        run: NODE_ENV=test pnpm test:e2e
        env:
          NODE_ENV: test
          MONGO_URI: ${{ env.MONGO_URI }}