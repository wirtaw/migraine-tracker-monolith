name: CI/CD Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Set up Docker Compose
        uses: docker/setup-buildx-action@v3

      - name: Start MongoDB container
        run: docker-compose -f docker-compose.test.yml up -d
        env:
          NODE_ENV: test

      - name: Wait for MongoDB container to be ready
        run: sleep 15

      - name: Lint
        run: pnpm lint

      - name: Format
        run: pnpm format

      - name: Test
        run: pnpm test
        env:
          NODE_ENV: test
          IS_PODMAN: false

      - name: Test E2E
        run: pnpm test:e2e
        env:
          NODE_ENV: test

      - name: Stop MongoDB container
        if: always()
        run: docker-compose -f docker-compose.test.yml down -v