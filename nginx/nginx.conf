# Worker processes and connections per worker.
# These should be tuned based on your server's CPU cores and expected load.
worker_processes auto;
worker_rlimit_nofile 8192; # Increase file descriptor limit

events {
    # Accept connections more efficiently.
    worker_connections 4096;
    # Use epoll for Linux systems, which is highly efficient.
    use epoll;
    multi_accept on;
}

http {
    # Log format for better visibility.
    # 'main' is a common and useful format.
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn; # Log errors with 'warn' level and higher

    # Gzip compression for faster delivery of content.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Basic rate limiting for protection against abuse.
    # 'limit_req_zone' defines a shared memory zone for tracking requests.
    # '$binary_remote_addr' uses the client's IP address.
    # 'zone=mylimit:10m' creates a 10MB zone.
    # 'rate=5r/s' limits to 5 requests per second.
    limit_req_zone $binary_remote_addr zone=mylimit:10m rate=5r/s;

    # Upstream definition for your Node.js application instances.
    # 'keepalive' helps maintain persistent connections, reducing overhead.
    upstream loadbalancer {
        server web1:3000;
        server web2:3000;
        # Add more servers as needed, e.g., for different ports or environments.
        # server web3:5000;

        # Keepalive connections for backend servers (HTTP/1.1 recommended for this)
        keepalive 64;
    }

    server {
        listen 8080;
        server_name localhost; # Replace 'localhost' with your domain name in production

        # Add security headers
        add_header X-Frame-Options "DENY";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy "no-referrer-when-downgrade";
        # Consider adding Strict-Transport-Security (HSTS) if you're using HTTPS
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Disable server signature for security
        server_tokens off;

        location / {
            # Apply rate limiting to this location.
            # 'burst=10' allows bursts of 10 requests.
            # 'nodelay' means requests are processed immediately if within burst,
            # otherwise they are delayed or rejected if burst and rate are exceeded.
            limit_req zone=mylimit burst=10 nodelay;

            proxy_pass http://loadbalancer;

            # Important proxy headers to pass client information to backend
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Increase timeouts to prevent early disconnections for long-running requests
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Proxy buffering can be useful for dynamic content
            proxy_buffering on;
            proxy_buffers 4 32k;
            proxy_buffer_size 16k;
        }

        # Optional: Error pages for better user experience and to hide default NGINX errors
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html; # Default NGINX error page location
            internal;
        }
    }
}